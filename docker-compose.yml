services:
  sveltekit-app:
    build: .
    container_name: sveltekit-app
    ports:
      - '127.0.0.1:4800:4800'
    restart: always
    env_file:
      - .env
    environment:
      - UPLOAD_DIR=/app/uploads
      # Override DATABASE_URL so the DB lives on the persistent volume, not the
      # ephemeral container layer.  The .env value is ignored for this key.
      - DATABASE_URL=file:/app/db/dev.db
    volumes:
      - uploads_data:/app/uploads
      - db_data:/app/db
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  uploads_data:
  db_data:
