name: CI

on:
  push:
    branches-ignore:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app-build:
    name: App + DB Build Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Database smoke test
        env:
          DATABASE_URL: file:./ci.db
        run: npm run db:smoke

      - name: Build app
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: app-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build --file Dockerfile --tag portfolio-ci:${{ github.sha }} .
